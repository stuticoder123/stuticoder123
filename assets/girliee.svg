<div align="center">

<svg width="400" height="20" viewBox="0 0 400 20">
  <circle cx="20" cy="10" r="3" fill="#FF69B4">
    <animate attributeName="cx" values="20;380;20" dur="6s" repeatCount="indefinite"/>
  </circle>

  <line x1="20" y1="10" x2="380" y2="10"
        stroke="#FFC0CB"
        stroke-width="2"
        stroke-dasharray="5,5"/>
</svg>

</div>
